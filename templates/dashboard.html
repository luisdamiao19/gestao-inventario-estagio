<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Inventário</title>

    <link rel="icon" href="/static/images/blc3.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row min-vh-100">

        <div class="col-md-2 bg-white border-end p-0">
            <div class="p-3 text-center border-bottom">
                <img src="/static/images/blc3.png" alt="BLC3" style="max-width: 120px;">
            </div>

            <div class="nav flex-column p-3">
                <a href="/dashboard" class="nav-link text-dark fw-bold">MENU</a>
                <a href="/produtos-page" class="nav-link text-dark">Produtos</a>
                <a href="/movimentacoes-page" class="nav-link text-dark">Movimentações</a>
                <a href="/relatorios-page" class="nav-link text-dark">Relatórios</a>

                <!-- Fica escondido por defeito e o dashboard.js mostra apenas se for administrador -->
                <a href="/utilizadores-page" class="nav-link text-dark d-none" id="linkUtilizadores">Utilizadores</a>
            </div>
        </div>

        <div class="col-md-10 p-0">

            <div class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-person-circle text-secondary fs-1"></i>

            <div>
                <h5 class="mb-0" id="boas-vindas">Bem-vindo</h5>
                <small class="text-muted" id="tipo-utilizador">Utilizador</small>
            </div>
        </div>

    <button id="btnSair" class="btn btn-outline-primary btn-sm">Sair</button>
            </div>

            <div class="p-4">

                <div class="row mb-4">

                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6>Total de Produtos</h6>
                                <p class="fs-4 fw-bold mb-0" id="total-produtos">0</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6>Stock Baixo</h6>
                                <p class="fs-4 fw-bold mb-0" id="stock-baixo">0</p>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="mb-4">Últimas movimentações</h5>

                        <div class="list-group list-group-flush" id="lista-movimentacoes">
                            <div class="list-group-item">A carregar movimentações...</div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
