<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Utilizadores</title>

    <link rel="icon" href="/static/images/blc3.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row min-vh-100">

        <div class="col-md-2 bg-white border-end p-0">
            <div class="p-3 text-center border-bottom">
                <img src="/static/images/blc3.png" alt="BLC3" style="max-width: 120px;">
            </div>

            <div class="nav flex-column p-3">
                <a href="/dashboard" class="nav-link text-dark">MENU</a>
                <a href="/produtos-page" class="nav-link text-dark">Produtos</a>
                <a href="/movimentacoes-page" class="nav-link text-dark">Movimentações</a>
                <a href="/relatorios-page" class="nav-link text-dark">Relatórios</a>
                <a href="/utilizadores-page" class="nav-link text-dark fw-bold d-none" id="linkUtilizadores">Utilizadores</a>
            </div>
        </div>

        <div class="col-md-10 p-0">

            <div class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0" id="boas-vindas">Gestão de Utilizadores</h5>
                <button id="btnSair" class="btn btn-outline-primary btn-sm">Sair</button>
            </div>

            <div class="p-4">

                <div class="card shadow-sm border-0">
                    <div class="card-body">

                        <h5 class="mb-4">Convidar novo utilizador</h5>

                        <form id="conviteForm">

                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" id="nome" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="tipo" class="form-label">Tipo de utilizador</label>
                                <select id="tipo" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option value="admin">Administrador</option>
                                    <option value="utilizador">Utilizador</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Enviar convite
                            </button>

                        </form>

                        <div id="mensagem" class="mt-3"></div>

                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="/static/js/utilizadores.js"></script>
</body>
</html>
