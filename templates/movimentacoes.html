<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Movimentações</title>

    <link rel="icon" href="/static/images/blc3.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Menu lateral -->
        <div class="col-md-2 bg-white border-end p-0">

            <div class="p-3 text-center border-bottom">
                <img src="/static/images/blc3.png" alt="BLC3" style="max-width: 120px;">
            </div>

            <div class="nav flex-column p-3">
                <a href="/dashboard" class="nav-link text-dark fw-bold">MENU</a>
                <a href="/produtos-page" class="nav-link text-dark">Produtos</a>
                <a href="/movimentacoes-page" class="nav-link text-dark fw-bold">Movimentações</a>
                <a href="/relatorios-page" class="nav-link text-dark">Relatórios</a>

                <a href="/utilizadores-page" class="nav-link text-dark d-none" id="linkUtilizadores">
                    Utilizadores
                </a>
            </div>
        </div>

        <!-- Área principal -->
        <div class="col-md-10 p-0">

            <!-- Barra superior -->
            <div class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-person-circle text-secondary fs-1"></i>

                    <div>
                        <h5 class="mb-0" id="boas-vindas">Bem-vindo</h5>
                        <small class="text-muted" id="tipo-utilizador">Utilizador</small>
                    </div>
                </div>

                <button id="btnSair" class="btn btn-outline-primary btn-sm">Sair</button>
            </div>

            <div class="p-4">

                <div class="card shadow-sm border-0">
                    <div class="card-body">

                        <h4 class="mb-4">Movimentações</h4>

                        <div id="mensagem" class="mb-3"></div>

                        <!-- Formulário para registar movimentação -->
                        <div id="formMovimentacao" class="card p-3 mb-4 d-none">

                            <h5 class="mb-3">Registar Movimentação</h5>

                            <form id="movimentacaoForm">

                                <div class="row">

                                    <div class="col-md-4 mb-3">
                                        <label for="produtoMovimento" class="form-label">Produto</label>
                                        <select id="produtoMovimento" class="form-select" required>
                                            <option value="">Selecionar produto</option>
                                        </select>
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label class="form-label">Tipo</label>

                                        <div>
                                            <input type="radio" id="tipoEntrada" name="tipoMovimento" value="entrada" required>
                                            <label for="tipoEntrada" class="me-3">Entrada</label>

                                            <input type="radio" id="tipoSaida" name="tipoMovimento" value="saida">
                                            <label for="tipoSaida">Saída</label>
                                        </div>
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="quantidadeMovimento" class="form-label">Quantidade</label>
                                        <input type="number" id="quantidadeMovimento" class="form-control" min="1" required>
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="motivoMovimento" class="form-label">Motivo</label>
                                        <input type="text" id="motivoMovimento" class="form-control">
                                    </div>

                                    <div class="col-md-8 mb-3">
                                        <label for="observacoesMovimento" class="form-label">Observações</label>
                                        <input type="text" id="observacoesMovimento" class="form-control">
                                    </div>

                                </div>

                                <button type="submit" class="btn btn-success">
                                    Confirmar Movimentação
                                </button>

                            </form>
                        </div>

                        <!-- Histórico de movimentações -->
                        <h5 class="mb-3">Histórico de Movimentações</h5>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Produto</th>
                                        <th>Tipo</th>
                                        <th>Quantidade</th>
                                        <th>Motivo</th>
                                        <th>Observações</th>
                                        <th>Perfil</th>
                                        <th>Data</th>
                                    </tr>
                                </thead>

                                <tbody id="tabelaMovimentos">
                                    <tr>
                                        <td colspan="7">A carregar movimentações...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="/static/js/movimentacoes.js"></script>

</body>
</html>
