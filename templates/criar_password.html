<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criar Password</title>

    <link rel="icon" href="/static/images/blc3.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card p-4 border-0">

                <h3 class="text-center mb-4">Criar Password</h3>

                <form id="criarPasswordForm">

                    <div class="mb-3">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Nova palavra-passe" 
                            required>
                    </div>

                    <div class="mb-3">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmar_password" 
                            placeholder="Confirmar palavra-passe" 
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Criar Password
                    </button>

                </form>

                <div id="mensagem" class="mt-3 text-center"></div>

                <div class="text-center mt-3">
                    <a href="/">Voltar ao login</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="/static/js/criar_password.js"></script>

</body>
</html>
