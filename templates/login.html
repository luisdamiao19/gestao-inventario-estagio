<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="icon" href="/static/images/blc3.png" type="image/png">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

                <div class="text-center mb-4">
                    <img src="/static/images/blc3.png" alt="BLC3" style="max-width: 130px;">
                                <h4 class="mt-3 mb-0">Iniciar sessão</h4>
                </div>

                <form id="loginForm">

                    <div class="mb-3">
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            placeholder="Email" 
                            required>
                    </div>

                    <div class="mb-3">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Password" 
                            required>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="lembrarEmail">
                    <label class="form-check-label" for="lembrarEmail">
                      Lembrar email
                    </label>
                    </div>

                         <button type="submit" class="btn btn-primary w-100">Entrar</button>

                </form>

                <div class="text-center mt-3">
                        <a href="/recuperar-password-page">Esqueceu-se da palavra-chave?</a>
                </div>

                <div id="mensagem" class="mt-3 text-center text-danger"></div>

            </div>

        </div>
    </div>
</div>


<script src="/static/js/login.js"></script>

</body>
</html>
